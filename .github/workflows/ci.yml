name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [mysql, pgsql]
    env:
      DB_DRIVER: ${{ matrix.db }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect runner IDs
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare CI environment
        run: make ci-env

      - name: Start containers
        run: make ci-up

      - name: Install dependencies
        run: make ci-install

      - name: Run quality checks
        run: make ci-quality

      - name: Run test suite
        run: make ci-test-suite

      - name: Run E2E tests
        run: make ci-e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.db }}
          path: tests/_output/
          retention-days: 7

      - name: Stop containers
        if: always()
        run: make ci-down
